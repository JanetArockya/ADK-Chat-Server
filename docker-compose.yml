version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: chatapp-db
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword
      POSTGRES_DB: chatdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chatapp

  server:
    build: ./server
    container_name: chatapp-server
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chatuser:chatpassword@db:5432/chatdb
      JWT_SECRET: change-this-in-production-secret-key-12345
      NODE_ENV: production
      PORT: 3000
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: http://localhost:5173
      RUN_MIGRATIONS: "false"
    command: sh -c "if [ \"$RUN_MIGRATIONS\" = \"true\" ]; then npx prisma migrate deploy; fi; node index.js"
    networks:
      - chatapp

  client:
    build: ./client
    container_name: chatapp-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_WS_URL: http://localhost:3000
    depends_on:
      - server
    networks:
      - chatapp

volumes:
  pgdata:
  uploads:

networks:
  chatapp:
    driver: bridge